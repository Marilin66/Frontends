name: hopitel_app
description: "Hopitel - Plateforme de santé"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  dio: ^5.9.2
  go_router: ^17.1.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.2.4
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  pdf: ^3.12.0
  open_file: ^3.5.11
  flutter_pdfview: ^1.4.4
  csv: ^6.0.0
  tuple: ^2.0.2
  table_calendar: ^3.2.0
  flutter_dotenv: ^6.0.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  permission_handler: ^11.3.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_staggered_animations: ^1.1.1
  record: ^6.2.0
  path_provider: ^2.1.5
  audioplayers: ^6.6.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/onboarding_hero.png
    - assets/images/hopitellogo.svg
    - assets/images/hopitel_logo.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
